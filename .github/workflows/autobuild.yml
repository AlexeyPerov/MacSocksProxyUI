name: Autobuild

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: autobuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$tag' does not match required format vX.Y.Z" >&2
            exit 1
          fi
          app_version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Show toolchain versions
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build (release)
        run: swift build -c release

      - name: Package app bundle (release)
        env:
          MACPROXYUI_VERSION: ${{ steps.version.outputs.app_version }}
          MACPROXYUI_BUILD: ${{ github.run_number }}
        run: ./scripts/package-app.sh release

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            ".build/app/release/MacProxyUI.app" \
            "MacProxyUI-${{ steps.version.outputs.tag }}.zip"

      - name: Upload release app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacProxyUI-${{ steps.version.outputs.tag }}
          path: MacProxyUI-${{ steps.version.outputs.tag }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MacProxyUI ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: MacProxyUI-${{ steps.version.outputs.tag }}.zip
